<svg xmlns="http://www.w3.org/2000/svg" width="1919" height="185" viewBox="0 0 1919 185" role="img" aria-labelledby="title desc">
  <title id="title">Zider Logo Loop preview</title>
  <desc id="desc">A horizontal logo loop preview with several sample brand marks.</desc>
  <rect width="1919" height="185" fill="#ffffff"/>

  <g transform="translate(72 92)" stroke="#dd7658" stroke-width="8" stroke-linecap="round">
    <line x1="0" y1="-48" x2="0" y2="48"/>
    <line x1="-48" y1="0" x2="48" y2="0"/>
    <line x1="-34" y1="-34" x2="34" y2="34"/>
    <line x1="34" y1="-34" x2="-34" y2="34"/>
    <line x1="-18" y1="-45" x2="18" y2="45"/>
    <line x1="18" y1="-45" x2="-18" y2="45"/>
    <line x1="-45" y1="-18" x2="45" y2="18"/>
    <line x1="45" y1="-18" x2="-45" y2="18"/>
  </g>

  <g transform="translate(202 92)">
    <defs>
      <linearGradient id="ringBlue" x1="18" y1="16" x2="80" y2="84" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#00c8ff"/>
        <stop offset=".45" stop-color="#1b64f2"/>
        <stop offset="1" stop-color="#6d3df5"/>
      </linearGradient>
      <linearGradient id="ringGreen" x1="80" y1="16" x2="20" y2="82" gradientUnits="userSpaceOnUse">

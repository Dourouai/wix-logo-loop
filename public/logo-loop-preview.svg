<svg width="360" height="180" viewBox="0 0 360 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zider Logo Loop preview</title>
  <desc id="desc">A single-row logo marquee preview with multiple brand-style marks.</desc>
  <rect width="360" height="180" rx="16" fill="#FFFFFF"/>
  <rect x="1" y="1" width="358" height="178" rx="15" stroke="#E6ECF4" stroke-width="2"/>
  <rect x="1" y="1" width="358" height="52" rx="15" fill="#F4F6FA"/>
  <rect x="1" y="128" width="358" height="51" rx="15" fill="#F4F6FA"/>
  <rect x="20" y="70" width="320" height="40" rx="12" fill="#FFFFFF"/>

  <g clip-path="url(#rowClip)">
    <g transform="translate(23 83)">

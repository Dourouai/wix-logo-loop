        <stop offset=".5" stop-color="#00c8ff"/>
        <stop offset="1" stop-color="#69e66e"/>
      </linearGradient>
    </defs>
    <ellipse cx="50" cy="50" rx="34" ry="48" transform="rotate(38 50 50)" fill="none" stroke="url(#ringBlue)" stroke-width="21"/>
    <ellipse cx="50" cy="50" rx="34" ry="48" transform="rotate(-38 50 50)" fill="none" stroke="url(#ringGreen)" stroke-width="21"/>
    <ellipse cx="50" cy="50" rx="20" ry="31" fill="#fff"/>
  </g>

  <g transform="translate(315 36)">
    <rect width="184" height="78" rx="9" fill="#fb8128"/>
    <text x="92" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#fff">duda</text>
  </g>

  <text x="665" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700" letter-spacing="0" fill="#050505">OpenAI</text>

  <g transform="translate(895 38)">

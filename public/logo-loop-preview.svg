      <path d="M1 13c4-8 8-12 13-12 4 0 7 4 10 8 4-5 8-8 12-8 8 0 13 16 4 17-5 .6-10-3-16-9-5 6-10 10-15 9-6-.7-8-3-8-5Z" stroke="#116DFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="0" y="10" width="8" height="8" fill="#00A4EF"/>
      <rect x="10" y="10" width="8" height="8" fill="#FFB900"/>
    </g>

    <text x="190" y="94" fill="#4285F4" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">G</text>
    <text x="199" y="94" fill="#EA4335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">o</text>
    <text x="207" y="94" fill="#FBBC05" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">o</text>
    <text x="215" y="94" fill="#4285F4" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">g</text>
    <text x="223" y="94" fill="#34A853" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">l</text>
    <text x="226" y="94" fill="#EA4335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">e</text>


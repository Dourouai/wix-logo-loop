      <path d="M6 15 14 5" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      <path d="M14 5c5 3 4 10-1 13" stroke="#05C46B" stroke-width="3" stroke-linecap="round"/>

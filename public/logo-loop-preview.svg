    <line x1="-48" y1="0" x2="48" y2="0"/>
    <line x1="-34" y1="-34" x2="34" y2="34"/>
    <line x1="34" y1="-34" x2="-34" y2="34"/>
    <line x1="-18" y1="-45" x2="18" y2="45"/>
    <line x1="18" y1="-45" x2="-18" y2="45"/>
    <line x1="-45" y1="-18" x2="45" y2="18"/>
    <line x1="45" y1="-18" x2="-45" y2="18"/>
